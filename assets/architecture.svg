<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="560" viewBox="0 0 1240 560"><rect x="0" y="0" width="1240" height="560" fill="#ffffff"/><text x="620" y="42" font-family="Helvetica-Bold" font-size="22" fill="#16314d" text-anchor="middle">Job Application Agent — Architecture</text><text x="620" y="66" font-family="Helvetica" font-size="13" fill="#5b6b7b" text-anchor="middle">Finds roles, scores fit with AI, tailors a CV per job, and delivers a ready-to-apply shortlist</text><rect x="40" y="115" width="200" height="150" rx="10" ry="10" fill="#eaf2fb" stroke="#3b4a5a" stroke-width="1.6"/><text x="140.0" y="139" font-family="Helvetica-Bold" font-size="15" fill="#16314d" text-anchor="middle">1 · Discover</text><text x="140.0" y="161" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">Job boards (Remote /</text><text x="140.0" y="179" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">Regional)</text><text x="140.0" y="197" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">The Muse</text><text x="140.0" y="215" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">LinkedIn (Apify)</text><rect x="285" y="115" width="200" height="150" rx="10" ry="10" fill="#eef2f7" stroke="#3b4a5a" stroke-width="1.6"/><text x="385.0" y="139" font-family="Helvetica-Bold" font-size="15" fill="#16314d" text-anchor="middle">2 · Deduplicate</text><text x="385.0" y="161" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">tracker.py</text><text x="385.0" y="179" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle"></text><text x="385.0" y="197" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">skip jobs already</text><text x="385.0" y="215" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">seen before</text><rect x="530" y="115" width="200" height="150" rx="10" ry="10" fill="#fbeee9" stroke="#3b4a5a" stroke-width="1.6"/><rect x="530" y="115" width="6" height="150" rx="3" ry="3" fill="#c6613f"/><text x="630.0" y="139" font-family="Helvetica-Bold" font-size="15" fill="#16314d" text-anchor="middle">3 · Score fit</text><text x="630.0" y="161" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">matcher.py</text><text x="630.0" y="179" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle"></text><text x="630.0" y="197" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">Claude rates 0–10</text><text x="630.0" y="215" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">keep strong matches</text><rect x="775" y="115" width="200" height="150" rx="10" ry="10" fill="#fbeee9" stroke="#3b4a5a" stroke-width="1.6"/><rect x="775" y="115" width="6" height="150" rx="3" ry="3" fill="#c6613f"/><text x="875.0" y="139" font-family="Helvetica-Bold" font-size="15" fill="#16314d" text-anchor="middle">4 · Tailor CV</text><text x="875.0" y="161" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">cv_tailor.py</text><text x="875.0" y="179" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">Claude writes a CV</text><text x="875.0" y="197" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">per job → PDF</text><text x="875.0" y="215" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">stored, link returned</text><rect x="1020" y="115" width="200" height="150" rx="10" ry="10" fill="#e9f6ee" stroke="#3b4a5a" stroke-width="1.6"/><text x="1120.0" y="139" font-family="Helvetica-Bold" font-size="15" fill="#1f7a4d" text-anchor="middle">5 · Deliver</text><text x="1120.0" y="161" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">notifier.py</text><text x="1120.0" y="179" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">Google Sheet +</text><text x="1120.0" y="197" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">HTML email digest</text><text x="1120.0" y="215" font-family="Helvetica" font-size="12" fill="#33414f" text-anchor="middle">→ you review &amp; apply</text><line x1="240" y1="190.0" x2="285" y2="190.0" stroke="#5b6b7b" stroke-width="2"/><polygon points="285,190.0 274.9,194.3 274.9,185.7" fill="#5b6b7b"/><line x1="485" y1="190.0" x2="530" y2="190.0" stroke="#5b6b7b" stroke-width="2"/><polygon points="530,190.0 519.9,194.3 519.9,185.7" fill="#5b6b7b"/><line x1="730" y1="190.0" x2="775" y2="190.0" stroke="#5b6b7b" stroke-width="2"/><polygon points="775,190.0 764.9,194.3 764.9,185.7" fill="#5b6b7b"/><line x1="975" y1="190.0" x2="1020" y2="190.0" stroke="#5b6b7b" stroke-width="2"/><polygon points="1020,190.0 1009.9,194.3 1009.9,185.7" fill="#5b6b7b"/><text x="620" y="313" font-family="Helvetica-Bold" font-size="13" fill="#c6613f" text-anchor="middle">Claude (LLM) powers scoring + CV tailoring</text><rect x="40" y="502" width="1160" height="42" rx="10" ry="10" fill="#f3f4f6" stroke="#c7cdd4" stroke-width="1.6"/><text x="620.0" y="526" font-family="Helvetica-Bold" font-size="15" fill="#42505e" text-anchor="middle">Orchestrated by run_all.py  ·  scheduled on GitHub Actions (cron)  ·  per-run API cost tracked  ·  credentials via env / secrets (placeholders only)</text></svg>