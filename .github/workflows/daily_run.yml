name: Job Agent Daily Run

on:
  # Runs at 8:00 AM PKT (3:00 AM UTC) every day
  schedule:
  - cron: '0 3 * * 1,3,5'
  
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create google_credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google_credentials.json

      - name: Create .env file
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" >> .env
          echo "APIFY_API_KEY=${{ secrets.APIFY_API_KEY }}" >> .env
          echo "GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}" >> .env
          echo "EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env
          echo "EMAIL_RECEIVER=${{ secrets.EMAIL_RECEIVER }}" >> .env
          echo "GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}" >> .env

      - name: Run job agent
        run: python run_all.py

      - name: Save trackers and CVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tailored_cvs/*.pdf
          if ls jobs_seen_*.json 1>/dev/null 2>&1; then
            git add -f jobs_seen_*.json
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update trackers and CVs [skip ci]"
            git push
          fi